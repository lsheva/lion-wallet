name: Release

on:
  push:
    tags: ["v*"]
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    if: github.actor == 'lsheva'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bump version, commit, and tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          scripts/release.sh ${{ inputs.bump }}
          git push origin HEAD --follow-tags

      - name: Resolve version tag
        id: version
        run: |
          TAG="v$(node -p 'require(\"./package.json\").version')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # On push-to-main, check if this version is already tagged
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists, skipping release"
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "New version detected, creating tag $TAG"
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag "$TAG"
              git push origin "$TAG"
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Chrome extension signing key
        if: steps.version.outputs.skip != 'true'
        run: echo "$CHROME_EXTENSION_PEM" > chrome-extension.pem
        env:
          CHROME_EXTENSION_PEM: ${{ secrets.CHROME_EXTENSION_PEM }}

      - name: Generate Chrome extension ID and patch manifests
        if: steps.version.outputs.skip != 'true'
        run: bash scripts/gen-chrome-key.sh

      - name: Build extension
        if: steps.version.outputs.skip != 'true'
        run: pnpm build:ext

      - name: Build Chrome extension
        if: steps.version.outputs.skip != 'true'
        run: pnpm build:chrome:ext

      - name: Build Safari app (unsigned)
        if: steps.version.outputs.skip != 'true'
        run: |
          xcodebuild -project xcode/LionWallet/LionWallet.xcodeproj \
            -scheme LionWallet \
            -configuration Release \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_ALLOWED=NO \
            build \
            -derivedDataPath build/safari

      - name: Package installers
        if: steps.version.outputs.skip != 'true'
        run: |
          bash scripts/build-installer.sh \
            --package-only \
            --app-dir=build/safari/Build/Products/Release/LionWallet.app

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            build/LionWallet-*.pkg
            build/LionWallet-*.dmg
            build/lion-wallet-chrome-*.zip
          generate_release_notes: true
