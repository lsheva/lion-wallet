name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    if: github.actor == 'lsheva'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bump version, commit, and tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          scripts/release.sh ${{ inputs.bump }}
          git push origin HEAD --follow-tags

      - name: Resolve version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build extension
        run: pnpm build:ext

      - name: Build Safari app (unsigned)
        run: |
          xcodebuild -project xcode/LionWallet/LionWallet.xcodeproj \
            -scheme LionWallet \
            -configuration Release \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_ALLOWED=NO \
            build \
            -derivedDataPath build

      - name: Package app
        run: |
          APP_PATH=$(find build -name "LionWallet.app" -type d | head -1)
          ditto -c -k --keepParent "$APP_PATH" LionWallet-${{ steps.version.outputs.tag }}-macOS.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: LionWallet-*.zip
          generate_release_notes: true
